[build]
  command   = "npm run build"
  publish   = ".next"

# Secrets scanning flags the NEXT_PUBLIC_ anon key that is intentionally
# embedded in the client bundle. All real secrets are stored in Netlify
# environment variables, not committed to the repository.
[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"
